# BLE
CONFIG_BT_BAS=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

#XIAO
CONFIG_NFCT_PINS_AS_GPIOS=y

#Trackpad
CONFIG_I2C=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_INPUT_IQS9151=y
CONFIG_INPUT_THREAD_STACK_SIZE=4096
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=2000

#ZMKSLEEP
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

#RGBLEDWIDGET
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
CONFIG_RGBLED_WIDGET_SHOW_LAYER_CHANGE=n
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=1
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=3
CONFIG_RGBLED_WIDGET_LAYER_5_COLOR=7
CONFIG_RGBLED_WIDGET_LAYER_6_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_7_COLOR=1
CONFIG_RGBLED_WIDGET_LAYER_8_COLOR=2
CONFIG_RGBLED_WIDGET_LAYER_9_COLOR=3
CONFIG_RGBLED_WIDGET_LAYER_10_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_11_COLOR=5
CONFIG_RGBLED_WIDGET_LAYER_12_COLOR=6
CONFIG_RGBLED_WIDGET_LAYER_13_COLOR=7
CONFIG_RGBLED_WIDGET_LAYER_14_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_15_COLOR=1
CONFIG_RGBLED_WIDGET_LAYER_16_COLOR=2
CONFIG_RGBLED_WIDGET_LAYER_17_COLOR=3
CONFIG_RGBLED_WIDGET_LAYER_18_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_19_COLOR=5
CONFIG_RGBLED_WIDGET_LAYER_20_COLOR=6
CONFIG_RGBLED_WIDGET_LAYER_21_COLOR=7
CONFIG_RGBLED_WIDGET_LAYER_22_COLOR=1

#CHGLED
CONFIG_ZMK_EASY_CHARGE_INDICATOR=y

#STUDIO
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n 

# Debug: USB ログは共通で有効にしないこと（左ビルドで失敗しやすい）。
# build.yaml の zmk-usb-logging 行でビルドした右半分 UF2（artifact *usblog*）を焼き、シリアルで確認する。
# 必要なら右専用 lalapadgen2_right.conf で下記を追加:
# CONFIG_INPUT_LOG_LEVEL_DBG=y
# CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=3000
